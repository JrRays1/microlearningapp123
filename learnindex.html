<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — CMA Micro-Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#161a1f;
    --paper:#f6f3ec;
    --panel:#1e242c;
    --panel-2:#252d37;
    --gold:#c9a24b;
    --gold-dim:#8a7238;
    --green:#5f9a72;
    --red:#c25c4f;
    --line:#333c47;
    --muted:#8b93a1;
    --white:#f2efe6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--ink);
    color:var(--white);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:980px; margin:0 auto; padding:32px 20px 80px;}

  header.top{
    display:flex; justify-content:space-between; align-items:flex-end;
    border-bottom:1px solid var(--line); padding-bottom:20px; margin-bottom:28px;
    flex-wrap:wrap; gap:12px;
  }
  .brand{
    font-family:'Fraunces',serif; font-weight:600; font-size:28px;
    letter-spacing:-0.01em;
  }
  .brand span{color:var(--gold);}
  .tagline{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-top:4px;}
  .stats{display:flex; gap:24px; font-family:'IBM Plex Mono',monospace;}
  .stat{text-align:right;}
  .stat .n{font-size:22px; color:var(--gold); font-weight:600;}
  .stat .l{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em;}

  .board{display:grid; grid-template-columns:280px 1fr; gap:24px;}
  @media (max-width:760px){ .board{grid-template-columns:1fr;} }

  .ledger-list{border-right:1px solid var(--line); padding-right:20px;}
  @media (max-width:760px){ .ledger-list{border-right:none; border-bottom:1px solid var(--line); padding-right:0; padding-bottom:20px;} }

  .cat-label{font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:var(--gold-dim); margin:18px 0 8px; }
  .cat-label:first-child{margin-top:0;}

  .entry{
    display:flex; align-items:center; gap:10px;
    padding:10px 8px; border-radius:4px; cursor:pointer;
    border-left:2px solid transparent;
    font-size:14px;
  }
  .entry:hover{background:var(--panel);}
  .entry.active{background:var(--panel-2); border-left:2px solid var(--gold);}
  .entry .dot{
    width:8px; height:8px; border-radius:50%; flex-shrink:0;
    border:1.5px solid var(--muted);
  }
  .entry.done .dot{background:var(--green); border-color:var(--green);}
  .entry .title{flex:1; color:var(--white);}
  .entry .score{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gold);}

  .panel{background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:32px;}
  .lesson-cat{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gold); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px;}
  .lesson-title{font-family:'Fraunces',serif; font-size:26px; font-weight:600; margin-bottom:18px; line-height:1.25;}
  .lesson-body p{font-size:15.5px; line-height:1.7; color:#d7d9dd; margin-bottom:14px;}
  .lesson-body strong{color:var(--gold);}

  .btn{
    font-family:'IBM Plex Mono',monospace; font-size:12px; text-transform:uppercase; letter-spacing:0.06em;
    background:var(--gold); color:var(--ink); border:none; padding:12px 20px; border-radius:4px;
    cursor:pointer; font-weight:600; margin-top:10px;
  }
  .btn:hover{background:#dab767;}
  .btn.ghost{background:transparent; border:1px solid var(--line); color:var(--white);}
  .btn.ghost:hover{border-color:var(--gold); color:var(--gold);}
  .btn:disabled{opacity:0.4; cursor:not-allowed;}

  .quiz-q{margin-bottom:22px;}
  .quiz-q .qtext{font-size:15px; margin-bottom:10px; color:var(--white); font-weight:500;}
  .opt{
    display:block; padding:10px 14px; margin-bottom:8px; border:1px solid var(--line);
    border-radius:4px; cursor:pointer; font-size:14px; color:#d7d9dd;
  }
  .opt:hover{border-color:var(--gold-dim);}
  .opt.selected{border-color:var(--gold); background:rgba(201,162,75,0.08);}
  .opt.correct{border-color:var(--green); background:rgba(95,154,114,0.12); color:var(--green);}
  .opt.wrong{border-color:var(--red); background:rgba(194,92,79,0.12); color:var(--red);}
  .opt.disabled{cursor:default;}

  .result-banner{
    font-family:'IBM Plex Mono',monospace; padding:16px; border-radius:4px; margin-bottom:20px;
    font-size:14px;
  }
  .result-banner.pass{background:rgba(95,154,114,0.12); border:1px solid var(--green); color:var(--green);}
  .result-banner.fail{background:rgba(194,92,79,0.12); border:1px solid var(--red); color:var(--red);}

  .empty{color:var(--muted); font-size:14px; text-align:center; padding:60px 20px;}
  .loading{color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:12px;}
  .footnote{margin-top:24px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <div class="brand">Ledger<span>.</span></div>
      <div class="tagline">CMA · Finance · Business — micro-lessons</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="n" id="statStreak">0</div><div class="l">Day Streak</div></div>
      <div class="stat"><div class="n" id="statDone">0/0</div><div class="l">Completed</div></div>
      <div class="stat"><div class="n" id="statAvg">—</div><div class="l">Avg Score</div></div>
    </div>
  </header>

  <div class="board" id="appBoard" style="display:none;">
    <div class="ledger-list" id="ledgerList">
      <div class="loading">Loading lessons…</div>
    </div>
    <div class="panel" id="mainPanel">
      <div class="empty">Select a lesson from the ledger to begin.</div>
    </div>
  </div>

  <div id="loginScreen" style="display:none; max-width:360px; margin:60px auto;">
    <div class="panel">
      <div class="lesson-title" style="font-size:20px;">Sign in</div>
      <div id="loginError" style="color:var(--red); font-family:'IBM Plex Mono',monospace; font-size:12px; margin-bottom:12px; display:none;"></div>
      <input id="loginPassword" type="password" placeholder="Password" style="width:100%; padding:10px 12px; margin-bottom:14px; background:var(--panel-2); border:1px solid var(--line); border-radius:4px; color:var(--white); font-family:'Inter',sans-serif; font-size:14px;">
      <button class="btn" id="loginBtn" style="width:100%;">Sign in</button>
    </div>
  </div>

  <div class="footnote" id="authNote">Connecting…</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ---- FIREBASE CONFIG: replace with your new project's config ----
const firebaseConfig = {
  apiKey: "AIzaSyCVnByKRq8ejYc_pFDMaPBYRSwhTP2J9lc",
  authDomain: "microlearning-286fd.firebaseapp.com",
  projectId: "microlearning-286fd",
  storageBucket: "microlearning-286fd.firebasestorage.app",
  messagingSenderId: "248005201639",
  appId: "1:248005201639:web:4d28b439bbe86efd729c42"
};

// Fixed backing account — the login screen only asks for the password.
// This must match the user you create in Firebase Authentication → Users.
const FIXED_EMAIL = "rayden@ledger.local";

let db, auth, uid = null;
let firebaseReady = false;
let firebaseConfigured = true;

function showLogin(){
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('appBoard').style.display = 'none';
}
function showApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appBoard').style.display = 'grid';
}

try {
  const app = initializeApp(firebaseConfig);
  auth = getAuth(app);
  db = getFirestore(app);
  onAuthStateChanged(auth, (user) => {
    if (user) {
      uid = user.uid;
      firebaseReady = true;
      document.getElementById('authNote').textContent = `Signed in as ${user.email}. Progress synced.`;
      showApp();
      loadProgressAndRender();
    } else {
      firebaseReady = false;
      document.getElementById('authNote').textContent = 'Sign in to continue.';
      showLogin();
    }
  });
} catch (e) {
  firebaseConfigured = false;
  document.getElementById('authNote').textContent = 'Offline mode — progress saved on this device only (Firebase not configured yet).';
  showApp();
  loadProgressAndRender();
}

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginPassword').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

function doLogin(){
  const pw = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if (!pw){
    errEl.textContent = 'Enter your password.';
    errEl.style.display = 'block';
    return;
  }
  signInWithEmailAndPassword(auth, FIXED_EMAIL, pw).catch(err => {
    errEl.textContent = 'Wrong password.';
    errEl.style.display = 'block';
  });
}

// ---------------- LESSON CONTENT ----------------
const LESSONS = [
  {
    id: "cma-variance-1",
    category: "CMA · Cost Management",
    title: "Standard Costing & Variance Analysis",
    body: [
      "Standard costing sets a predetermined cost per unit for materials, labor, and overhead, based on expected efficiency and prices. Actual results are then compared against this standard to isolate exactly where performance diverged from plan.",
      "A <strong>price variance</strong> measures the difference caused by paying more or less than the standard rate — for example, a supplier price increase drives an unfavorable materials price variance. A <strong>quantity (efficiency) variance</strong> measures the difference caused by using more or less input than standard — like excess scrap on the shop floor.",
      "The core formula: Price Variance = (Actual Price − Standard Price) × Actual Quantity. Quantity Variance = (Actual Quantity − Standard Quantity) × Standard Price. Keeping price and quantity effects separate is the entire point — it tells management whether to talk to purchasing or to the production floor."
    ],
    quiz: [
      {
        q: "A materials price variance is unfavorable. What does that most directly indicate?",
        options: ["Workers used more material than expected", "The company paid more per unit of material than the standard price", "Sales volume was lower than budgeted", "Fixed overhead was under-applied"],
        correct: 1
      },
      {
        q: "Quantity (efficiency) variance is calculated using which price?",
        options: ["Actual price", "Standard price", "Market price", "Weighted average price"],
        correct: 1
      },
      {
        q: "Why separate price and quantity variances instead of reporting one total variance?",
        options: ["It's required by GAAP", "It routes accountability to the right department (purchasing vs. production)", "It simplifies the journal entries", "It eliminates the need for standard costs"],
        correct: 1
      }
    ]
  },
  {
    id: "fin-cost-behavior-1",
    category: "Finance · Cost Behavior",
    title: "Fixed, Variable & Mixed Costs",
    body: [
      "Every cost in a business behaves one of three ways as volume changes. <strong>Fixed costs</strong> stay constant in total regardless of activity level (rent, salaried supervisor pay) — but per unit, they fall as volume rises. <strong>Variable costs</strong> stay constant per unit (materials, sales commissions) but rise in total with volume.",
      "<strong>Mixed costs</strong> contain both a fixed and variable component — a utility bill with a flat base fee plus usage charges is the classic example. To plan and budget accurately, mixed costs need to be split into their fixed and variable pieces, commonly using the high-low method or regression analysis.",
      "This distinction drives contribution margin analysis: Sales − Variable Costs = Contribution Margin, which then covers fixed costs before anything becomes profit. Misclassifying a cost as fixed when it's actually variable will throw off every break-even and pricing decision built on top of it."
    ],
    quiz: [
      {
        q: "As production volume increases, total variable costs:",
        options: ["Stay the same", "Increase", "Decrease", "Become fixed"],
        correct: 1
      },
      {
        q: "Fixed cost per unit behaves how as volume increases?",
        options: ["Increases", "Stays constant", "Decreases", "Becomes variable"],
        correct: 2
      },
      {
        q: "A cost with both a flat monthly base and a per-unit usage charge is:",
        options: ["A pure fixed cost", "A pure variable cost", "A mixed (semi-variable) cost", "A sunk cost"],
        correct: 2
      },
      {
        q: "Contribution margin is calculated as:",
        options: ["Sales − Fixed Costs", "Sales − Variable Costs", "Sales − Total Costs", "Gross Profit − Operating Expenses"],
        correct: 1
      }
    ]
  },
  {
    id: "fin-budgeting-1",
    category: "CMA · Planning & Budgeting",
    title: "The Master Budget & Flexible Budgets",
    body: [
      "A <strong>master budget</strong> is the complete set of interlocking budgets for a period — it starts with the sales forecast, which drives the production budget, which drives materials, labor, and overhead budgets, which roll up into budgeted financial statements.",
      "A <strong>static budget</strong> is set at one activity level and never adjusted. A <strong>flexible budget</strong> recalculates expected costs and revenue at the actual level of activity achieved, which makes it a far more useful comparison tool — it separates true performance variances from variances that are simply artifacts of selling more or less than planned.",
      "This is why flexible-budget variance analysis is central to CMA exam material: comparing actual results to a static budget conflates volume effects with efficiency effects, while comparing to a flexible budget isolates real operational performance."
    ],
    quiz: [
      {
        q: "What typically drives the entire master budget process?",
        options: ["The capital expenditure budget", "The sales forecast", "The cash budget", "The labor budget"],
        correct: 1
      },
      {
        q: "The main advantage of a flexible budget over a static budget is that it:",
        options: ["Is easier to prepare", "Adjusts for the actual level of activity, isolating true performance variances", "Eliminates the need for standard costs", "Is required for external reporting"],
        correct: 1
      },
      {
        q: "If a company sold fewer units than planned, a static budget comparison alone will:",
        options: ["Correctly isolate efficiency problems", "Conflate the volume shortfall with actual cost performance", "Be identical to a flexible budget comparison", "Not be affected"],
        correct: 1
      }
    ]
  },
  {
    id: "fin-statement-analysis-1",
    category: "Finance · Statement Analysis",
    title: "Liquidity & Solvency Ratios",
    body: [
      "<strong>Liquidity ratios</strong> measure a company's ability to meet short-term obligations. The current ratio (Current Assets ÷ Current Liabilities) is the broadest measure; the quick ratio ((Current Assets − Inventory) ÷ Current Liabilities) is stricter because it excludes inventory, which isn't always quickly convertible to cash.",
      "<strong>Solvency ratios</strong> look further out, measuring a company's ability to meet long-term debt obligations. Debt-to-equity (Total Liabilities ÷ Total Equity) shows how leveraged the company is; interest coverage (EBIT ÷ Interest Expense) shows how comfortably operating earnings cover interest payments.",
      "A business can be highly profitable and still fail if it's illiquid — this is why lenders and analysts weight these ratios heavily before profitability ratios when assessing near-term risk."
    ],
    quiz: [
      {
        q: "The quick ratio differs from the current ratio because it excludes:",
        options: ["Cash", "Accounts receivable", "Inventory", "Accounts payable"],
        correct: 2
      },
      {
        q: "Debt-to-equity ratio measures:",
        options: ["Short-term liquidity", "How leveraged the company is with debt vs. owner capital", "Profitability per share", "Inventory turnover speed"],
        correct: 1
      },
      {
        q: "A company can be profitable but still fail because it is:",
        options: ["Over-leveraged on equity", "Illiquid — unable to meet short-term obligations", "Under-taxed", "Over-diversified"],
        correct: 1
      }
    ]
  },
  {
    id: "fin-working-capital-1",
    category: "CMA · Working Capital",
    title: "Managing the Cash Conversion Cycle",
    body: [
      "The <strong>cash conversion cycle (CCC)</strong> measures how long cash is tied up in operations before it comes back in the door. CCC = Days Inventory Outstanding + Days Sales Outstanding − Days Payable Outstanding.",
      "Shortening the cycle means either selling inventory faster, collecting receivables faster, or paying suppliers slower (without damaging the relationship or missing early-payment discounts). Every day shaved off the CCC frees up cash that would otherwise be sitting in unsold inventory or unpaid invoices.",
      "For a business like a glass installer with material-heavy jobs, this matters directly: inventory sitting in stock and unpaid customer invoices both stretch the cycle, while negotiating better supplier terms compresses it."
    ],
    quiz: [
      {
        q: "The Cash Conversion Cycle formula is:",
        options: ["DIO + DSO − DPO", "DIO − DSO + DPO", "DSO + DPO − DIO", "DIO + DPO + DSO"],
        correct: 0
      },
      {
        q: "Which action would shorten the cash conversion cycle?",
        options: ["Collecting receivables slower", "Holding more inventory", "Paying suppliers faster than terms require", "Collecting receivables faster"],
        correct: 3
      },
      {
        q: "A long cash conversion cycle primarily signals:",
        options: ["High profitability", "Cash is tied up longer in operations before returning", "Low leverage", "Strong liquidity"],
        correct: 1
      }
    ]
  },
  {
    id: "biz-breakeven-1",
    category: "Business · Decision Making",
    title: "Break-Even & Target Profit Analysis",
    body: [
      "Break-even is the point where total contribution margin exactly covers fixed costs — Break-Even Units = Fixed Costs ÷ Contribution Margin per Unit. Below this point, the business loses money; above it, each additional unit contributes directly to profit.",
      "Target profit analysis extends the same logic: Units Needed = (Fixed Costs + Target Profit) ÷ Contribution Margin per Unit. This turns a profit goal into a concrete, actionable sales target.",
      "This framework is why pricing and cost-control decisions can't be made in isolation — raising price increases contribution margin per unit and lowers the break-even point, while a cost increase does the opposite, even with no change in sales volume."
    ],
    quiz: [
      {
        q: "Break-even units are calculated as:",
        options: ["Fixed Costs ÷ Contribution Margin per Unit", "Total Costs ÷ Price per Unit", "Variable Costs ÷ Fixed Costs", "Sales ÷ Contribution Margin Ratio"],
        correct: 0
      },
      {
        q: "If price per unit increases with no change in variable cost, the break-even point will:",
        options: ["Increase", "Decrease", "Stay exactly the same", "Become undefined"],
        correct: 1
      },
      {
        q: "Target profit analysis answers which question?",
        options: ["How many units must be sold to reach a specific profit goal?", "What is the company's tax liability?", "How much debt can the company support?", "What is the optimal inventory level?"],
        correct: 0
      }
    ]
  }
];

// ---------------- STATE ----------------
let progress = {}; // { lessonId: { completed: bool, score: number, total: number, lastDate: 'YYYY-MM-DD' } }
let activeLessonId = null;
let quizState = null; // { answers: [], submitted: bool }

const LOCAL_KEY = 'ledger_progress_v1';

async function loadProgressAndRender(){
  if (firebaseReady && uid){
    const snap = await getDocs(collection(db, 'users', uid, 'progress'));
    progress = {};
    snap.forEach(d => progress[d.id] = d.data());
  } else {
    try{ progress = JSON.parse(localStorage.getItem(LOCAL_KEY) || '{}'); } catch(e){ progress = {}; }
  }
  renderLedger();
  renderStats();
  if (!activeLessonId) renderEmpty();
}

async function saveProgress(lessonId, data){
  progress[lessonId] = data;
  if (firebaseReady && uid){
    await setDoc(doc(db, 'users', uid, 'progress', lessonId), data);
  } else {
    localStorage.setItem(LOCAL_KEY, JSON.stringify(progress));
  }
  renderLedger();
  renderStats();
}

function renderStats(){
  const total = LESSONS.length;
  const doneEntries = Object.values(progress).filter(p => p.completed);
  const done = doneEntries.length;
  document.getElementById('statDone').textContent = `${done}/${total}`;

  if (doneEntries.length){
    const avg = doneEntries.reduce((s,p) => s + (p.score/p.total*100), 0) / doneEntries.length;
    document.getElementById('statAvg').textContent = Math.round(avg) + '%';
  } else {
    document.getElementById('statAvg').textContent = '—';
  }

  // streak: consecutive days with at least one completion, counting back from today
  const dates = new Set(doneEntries.map(p => p.lastDate));
  let streak = 0;
  let d = new Date();
  while (true){
    const key = d.toISOString().slice(0,10);
    if (dates.has(key)){ streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  document.getElementById('statStreak').textContent = streak;
}

function renderLedger(){
  const list = document.getElementById('ledgerList');
  list.innerHTML = '';
  let lastCat = null;
  LESSONS.forEach(lesson => {
    if (lesson.category !== lastCat){
      const catEl = document.createElement('div');
      catEl.className = 'cat-label';
      catEl.textContent = lesson.category;
      list.appendChild(catEl);
      lastCat = lesson.category;
    }
    const p = progress[lesson.id];
    const entry = document.createElement('div');
    entry.className = 'entry' + (lesson.id === activeLessonId ? ' active' : '') + (p && p.completed ? ' done' : '');
    entry.innerHTML = `
      <span class="dot"></span>
      <span class="title">${lesson.title}</span>
      ${p && p.completed ? `<span class="score">${p.score}/${p.total}</span>` : ''}
    `;
    entry.addEventListener('click', () => openLesson(lesson.id));
    list.appendChild(entry);
  });
}

function renderEmpty(){
  document.getElementById('mainPanel').innerHTML = `<div class="empty">Select a lesson from the ledger to begin.</div>`;
}

function openLesson(id){
  activeLessonId = id;
  quizState = null;
  renderLedger();
  renderLessonView(id);
}

function renderLessonView(id){
  const lesson = LESSONS.find(l => l.id === id);
  const panel = document.getElementById('mainPanel');
  panel.innerHTML = `
    <div class="lesson-cat">${lesson.category}</div>
    <div class="lesson-title">${lesson.title}</div>
    <div class="lesson-body">${lesson.body.map(p => `<p>${p}</p>`).join('')}</div>
    <button class="btn" id="startQuizBtn">Take the quiz →</button>
  `;
  document.getElementById('startQuizBtn').addEventListener('click', () => startQuiz(id));
}

function startQuiz(id){
  const lesson = LESSONS.find(l => l.id === id);
  quizState = { answers: new Array(lesson.quiz.length).fill(null), submitted: false };
  renderQuizView(id);
}

function renderQuizView(id){
  const lesson = LESSONS.find(l => l.id === id);
  const panel = document.getElementById('mainPanel');
  let html = `
    <div class="lesson-cat">${lesson.category}</div>
    <div class="lesson-title">${lesson.title} — Quiz</div>
  `;
  lesson.quiz.forEach((q, qi) => {
    html += `<div class="quiz-q"><div class="qtext">${qi+1}. ${q.q}</div>`;
    q.options.forEach((opt, oi) => {
      let cls = 'opt';
      if (quizState.submitted){
        cls += ' disabled';
        if (oi === q.correct) cls += ' correct';
        else if (quizState.answers[qi] === oi) cls += ' wrong';
      } else if (quizState.answers[qi] === oi){
        cls += ' selected';
      }
      html += `<div class="${cls}" data-qi="${qi}" data-oi="${oi}">${opt}</div>`;
    });
    html += `</div>`;
  });

  if (!quizState.submitted){
    html += `<button class="btn" id="submitQuizBtn">Submit answers</button>`;
  } else {
    const score = quizState.answers.filter((a, i) => a === lesson.quiz[i].correct).length;
    const total = lesson.quiz.length;
    const pct = Math.round(score/total*100);
    const pass = pct >= 70;
    html = `<div class="result-banner ${pass ? 'pass' : 'fail'}">${score}/${total} correct (${pct}%) — ${pass ? 'Passed.' : 'Below 70% — review the lesson and retry.'}</div>` + html;
    html += `<button class="btn ghost" id="retryQuizBtn">Retry quiz</button> <button class="btn ghost" id="backBtn">Back to lesson</button>`;
  }

  panel.innerHTML = html;

  if (!quizState.submitted){
    panel.querySelectorAll('.opt').forEach(el => {
      el.addEventListener('click', () => {
        const qi = parseInt(el.dataset.qi);
        const oi = parseInt(el.dataset.oi);
        quizState.answers[qi] = oi;
        renderQuizView(id);
      });
    });
    const submitBtn = document.getElementById('submitQuizBtn');
    submitBtn.disabled = quizState.answers.includes(null);
    submitBtn.addEventListener('click', () => submitQuiz(id));
  } else {
    document.getElementById('retryQuizBtn').addEventListener('click', () => startQuiz(id));
    document.getElementById('backBtn').addEventListener('click', () => renderLessonView(id));
  }
}

async function submitQuiz(id){
  const lesson = LESSONS.find(l => l.id === id);
  quizState.submitted = true;
  const score = quizState.answers.filter((a, i) => a === lesson.quiz[i].correct).length;
  const total = lesson.quiz.length;
  const today = new Date().toISOString().slice(0,10);
  await saveProgress(id, { completed: score/total >= 0.7, score, total, lastDate: today });
  renderQuizView(id);
}

// initial paint before auth resolves
renderLedger();
renderStats();
</script>
