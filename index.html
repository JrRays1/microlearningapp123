<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — CMA Micro-Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#161a1f;
    --paper:#f6f3ec;
    --panel:#1e242c;
    --panel-2:#252d37;
    --gold:#c9a24b;
    --gold-dim:#8a7238;
    --green:#5f9a72;
    --red:#c25c4f;
    --line:#333c47;
    --muted:#8b93a1;
    --white:#f2efe6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--ink);
    color:var(--white);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:980px; margin:0 auto; padding:32px 20px 80px;}

  header.top{
    display:flex; justify-content:space-between; align-items:flex-end;
    border-bottom:1px solid var(--line); padding-bottom:20px; margin-bottom:28px;
    flex-wrap:wrap; gap:12px;
  }
  .brand{
    font-family:'Fraunces',serif; font-weight:600; font-size:28px;
    letter-spacing:-0.01em;
  }
  .brand span{color:var(--gold);}
  .tagline{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-top:4px;}
  .stats{display:flex; gap:24px; font-family:'IBM Plex Mono',monospace;}
  .stat{text-align:right;}
  .stat .n{font-size:22px; color:var(--gold); font-weight:600;}
  .stat .l{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em;}

  .board{max-width:720px; margin:0 auto; height:calc(100vh - 220px); min-height:400px;}
  @media (max-width:760px){ .board{height:auto;} .panel{height:auto; overflow-y:visible;} }

  .subject-pill{
    display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase;
    letter-spacing:0.08em; color:var(--ink); background:var(--gold); padding:4px 10px; border-radius:20px;
    margin-bottom:14px; font-weight:600;
  }
  .progress-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted);}

  .panel{background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:32px; height:100%; overflow-y:auto;}
  .lesson-cat{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gold); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px;}
  .lesson-title{font-family:'Fraunces',serif; font-size:32px; font-weight:600; margin-bottom:20px; line-height:1.25;}
  .lesson-body p{font-size:18px; line-height:1.8; color:#d7d9dd; margin-bottom:18px;}
  .lesson-body strong{color:var(--gold);}

  .btn{
    font-family:'IBM Plex Mono',monospace; font-size:13px; text-transform:uppercase; letter-spacing:0.06em;
    background:var(--gold); color:var(--ink); border:none; padding:14px 22px; border-radius:4px;
    cursor:pointer; font-weight:600; margin-top:10px;
  }
  .btn:hover{background:#dab767;}
  .btn.ghost{background:transparent; border:1px solid var(--line); color:var(--white);}
  .btn.ghost:hover{border-color:var(--gold); color:var(--gold);}
  .btn:disabled{opacity:0.4; cursor:not-allowed;}

  .quiz-q{margin-bottom:26px;}
  .quiz-q .qtext{font-size:18px; margin-bottom:12px; color:var(--white); font-weight:500; line-height:1.5;}
  .opt{
    display:block; padding:13px 16px; margin-bottom:9px; border:1px solid var(--line);
    border-radius:4px; cursor:pointer; font-size:16px; color:#d7d9dd; line-height:1.5;
  }
  .opt:hover{border-color:var(--gold-dim);}
  .opt.selected{border-color:var(--gold); background:rgba(201,162,75,0.08);}
  .opt.correct{border-color:var(--green); background:rgba(95,154,114,0.12); color:var(--green);}
  .opt.wrong{border-color:var(--red); background:rgba(194,92,79,0.12); color:var(--red);}
  .opt.disabled{cursor:default;}

  .result-banner{
    font-family:'IBM Plex Mono',monospace; padding:16px; border-radius:4px; margin-bottom:20px;
    font-size:14px;
  }
  .result-banner.pass{background:rgba(95,154,114,0.12); border:1px solid var(--green); color:var(--green);}
  .result-banner.fail{background:rgba(194,92,79,0.12); border:1px solid var(--red); color:var(--red);}

  .empty{color:var(--muted); font-size:14px; text-align:center; padding:60px 20px;}
  .loading{color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:12px;}
  .footnote{margin-top:24px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted);}

  .panel::-webkit-scrollbar{width:8px;}
  .panel::-webkit-scrollbar-track{background:transparent;}
  .panel::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}
  .panel::-webkit-scrollbar-thumb:hover{background:var(--gold-dim);}

  .track-toggle{display:flex; gap:8px; max-width:720px; margin:0 auto 20px;}
  .track-btn{
    flex:1; font-family:'IBM Plex Mono',monospace; font-size:12px; text-transform:uppercase; letter-spacing:0.04em;
    background:var(--panel); color:var(--muted); border:1px solid var(--line); padding:12px 10px; border-radius:4px;
    cursor:pointer; font-weight:600; text-align:center;
  }
  .track-btn:hover{border-color:var(--gold-dim); color:var(--white);}
  .track-btn.active{background:var(--gold); color:var(--ink); border-color:var(--gold);}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <div class="brand">Ledger<span>.</span></div>
      <div class="tagline" id="tagline">CMA · Finance · Business — micro-lessons</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="n" id="statStreak">0</div><div class="l">Day Streak</div></div>
      <div class="stat"><div class="n" id="statDone">0/0</div><div class="l">Completed</div></div>
      <div class="stat"><div class="n" id="statAvg">—</div><div class="l">Avg Score</div></div>
    </div>
  </header>

  <div class="track-toggle" id="trackToggle" style="display:none;">
    <button class="track-btn active" data-track="cma" id="trackBtnCma">CMA · Finance · Business</button>
    <button class="track-btn" data-track="mind" id="trackBtnMind">Philosophy & Psychology</button>
  </div>

  <div class="board" id="appBoard" style="display:none;">
    <div class="panel" id="mainPanel">
      <div class="loading">Loading lessons…</div>
    </div>
  </div>

  <div id="loginScreen" style="display:none; max-width:360px; margin:60px auto;">
    <div class="panel">
      <div class="lesson-title" style="font-size:20px;">Sign in</div>
      <div id="loginError" style="color:var(--red); font-family:'IBM Plex Mono',monospace; font-size:12px; margin-bottom:12px; display:none;"></div>
      <input id="loginPassword" type="password" placeholder="Password" style="width:100%; padding:10px 12px; margin-bottom:14px; background:var(--panel-2); border:1px solid var(--line); border-radius:4px; color:var(--white); font-family:'Inter',sans-serif; font-size:14px;">
      <button class="btn" id="loginBtn" style="width:100%;">Sign in</button>
    </div>
  </div>

  <div class="footnote" id="authNote">Connecting…</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ---- FIREBASE CONFIG: replace with your new project's config ----
const firebaseConfig = {
  apiKey: "AIzaSyCVnByKRq8ejYc_pFDMaPBYRSwhTP2J9lc",
  authDomain: "microlearning-286fd.firebaseapp.com",
  projectId: "microlearning-286fd",
  storageBucket: "microlearning-286fd.firebasestorage.app",
  messagingSenderId: "248005201639",
  appId: "1:248005201639:web:4d28b439bbe86efd729c42"
};

// Fixed backing account — the login screen only asks for the password.
// This must match the user you create in Firebase Authentication → Users.
const FIXED_EMAIL = "rayden@ledger.local";

let db, auth, uid = null;
let firebaseReady = false;
let firebaseConfigured = true;

function showLogin(){
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('appBoard').style.display = 'none';
  document.getElementById('trackToggle').style.display = 'none';
}
function showApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appBoard').style.display = 'block';
  document.getElementById('trackToggle').style.display = 'flex';
}

try {
  const app = initializeApp(firebaseConfig);
  auth = getAuth(app);
  db = getFirestore(app);
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      uid = user.uid;
      firebaseReady = true;
      document.getElementById('authNote').textContent = `Signed in as ${user.email}. Progress synced.`;
      showApp();
      await fetchLessons();
      await loadProgressAndRender();
    } else {
      firebaseReady = false;
      document.getElementById('authNote').textContent = 'Sign in to continue.';
      showLogin();
    }
  });
} catch (e) {
  firebaseConfigured = false;
  document.getElementById('authNote').textContent = 'Firebase is not configured — lessons live in Firestore now, so this app needs it to work.';
  showApp();
  document.getElementById('mainPanel').innerHTML = '<div class="loading">Lessons unavailable — Firebase not configured.</div>';
}

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginPassword').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
document.getElementById('trackBtnCma').addEventListener('click', () => switchTrack('cma'));
document.getElementById('trackBtnMind').addEventListener('click', () => switchTrack('mind'));

function doLogin(){
  const pw = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if (!pw){
    errEl.textContent = 'Enter your password.';
    errEl.style.display = 'block';
    return;
  }
  signInWithEmailAndPassword(auth, FIXED_EMAIL, pw).catch(err => {
    errEl.textContent = 'Wrong password.';
    errEl.style.display = 'block';
  });
}

// ---------------- LESSON CONTENT ----------------
// Lessons now live in Firestore's "lessons" collection (uploaded via upload-lessons.mjs).
// Each lesson has a "track" field ("cma" or "mind") deciding which side it belongs to.
const TRACKS = [
  { id: 'cma', label: 'CMA · Finance · Business' },
  { id: 'mind', label: 'Philosophy & Psychology' }
];
let ALL_LESSONS = []; // every lesson fetched, unfiltered
let currentTrack = 'cma';

// Per-track working data, rebuilt whenever the active track changes.
let LESSONS = [];
let SUBJECTS = {};
let SUBJECT_ORDER = [];

function subjectOf(lesson){
  // category looks like "CMA · Cost Management" — subject is the part before " · "
  return lesson.category.split('·')[0].trim();
}

async function fetchLessons(){
  const panel = document.getElementById('mainPanel');
  panel.innerHTML = '<div class="loading">Loading lessons…</div>';
  try {
    const snap = await getDocs(collection(db, 'lessons'));
    ALL_LESSONS = [];
    snap.forEach(d => ALL_LESSONS.push(d.data()));
    ALL_LESSONS.sort((a,b) => (a.category+a.title).localeCompare(b.category+b.title));
    rebuildTrackData(currentTrack);
  } catch (err) {
    panel.innerHTML = '<div class="loading">Could not load lessons — check your connection.</div>';
    console.error(err);
  }
}

function rebuildTrackData(trackId){
  // Lessons uploaded before the track field existed default to "cma".
  LESSONS = ALL_LESSONS.filter(l => (l.track || 'cma') === trackId);
  SUBJECTS = {};
  SUBJECT_ORDER = [];
  LESSONS.forEach(lesson => {
    const subj = subjectOf(lesson);
    if (!SUBJECTS[subj]){ SUBJECTS[subj] = []; SUBJECT_ORDER.push(subj); }
    SUBJECTS[subj].push(lesson);
  });
}

function setActiveTrackButton(trackId){
  document.getElementById('trackBtnCma').classList.toggle('active', trackId === 'cma');
  document.getElementById('trackBtnMind').classList.toggle('active', trackId === 'mind');
  const track = TRACKS.find(t => t.id === trackId);
  document.getElementById('tagline').textContent = `${track.label} — micro-lessons`;
}

async function switchTrack(trackId){
  if (trackId === currentTrack) return;
  currentTrack = trackId;
  localStorage.setItem(TRACK_LOCAL_KEY, trackId);
  setActiveTrackButton(trackId);
  rebuildTrackData(trackId);
  cycle = cycles[trackId];
  renderStats();
  renderCurrentLesson();
}

// ---------------- STATE ----------------
let progress = {}; // { lessonId: { completed: bool, score: number, total: number, lastDate: 'YYYY-MM-DD' } }
let quizState = null; // { answers: [], submitted: bool }

// Cycle state: which subject's turn is next, and how far through each subject's list we are.
// { subjectTurn: 0, pointers: { CMA: 0, Finance: 0, Business: 0 } }
let cycles = {
  cma: { subjectTurn: 0, pointers: {} },
  mind: { subjectTurn: 0, pointers: {} }
};
let cycle = cycles.cma; // alias to the active track's cycle object
let currentLessonId = null;

const LOCAL_KEY = 'ledger_progress_v1';
const CYCLE_LOCAL_KEY_PREFIX = 'ledger_cycle_v1_';
const TRACK_LOCAL_KEY = 'ledger_track_v1';

async function loadProgressAndRender(){
  currentTrack = localStorage.getItem(TRACK_LOCAL_KEY) || 'cma';

  if (firebaseReady && uid){
    const snap = await getDocs(collection(db, 'users', uid, 'progress'));
    progress = {};
    snap.forEach(d => progress[d.id] = d.data());

    for (const track of TRACKS){
      try {
        const cycleSnap = await getDoc(doc(db, 'users', uid, 'meta', 'cycle_' + track.id));
        if (cycleSnap.exists()) cycles[track.id] = cycleSnap.data();
      } catch(e){ /* no cycle doc yet for this track — defaults stand */ }
    }
  } else {
    try{ progress = JSON.parse(localStorage.getItem(LOCAL_KEY) || '{}'); } catch(e){ progress = {}; }
    for (const track of TRACKS){
      try{
        const stored = JSON.parse(localStorage.getItem(CYCLE_LOCAL_KEY_PREFIX + track.id) || '');
        if (stored) cycles[track.id] = stored;
      } catch(e){ /* defaults stand */ }
    }
  }

  cycle = cycles[currentTrack];
  rebuildTrackData(currentTrack);
  setActiveTrackButton(currentTrack);
  renderStats();
  renderCurrentLesson();
}

async function saveCycle(){
  cycles[currentTrack] = cycle; // keep the map in sync with the active alias
  if (firebaseReady && uid){
    try {
      await setDoc(doc(db, 'users', uid, 'meta', 'cycle_' + currentTrack), cycle);
    } catch (err) {
      console.error('Could not save cycle position to Firestore, falling back to local storage:', err);
      localStorage.setItem(CYCLE_LOCAL_KEY_PREFIX + currentTrack, JSON.stringify(cycle));
    }
  } else {
    localStorage.setItem(CYCLE_LOCAL_KEY_PREFIX + currentTrack, JSON.stringify(cycle));
  }
}

async function saveProgress(lessonId, data){
  progress[lessonId] = data;
  if (firebaseReady && uid){
    await setDoc(doc(db, 'users', uid, 'progress', lessonId), data);
  } else {
    localStorage.setItem(LOCAL_KEY, JSON.stringify(progress));
  }
  renderStats();
}

function renderStats(){
  const total = LESSONS.length;
  const trackLessonIds = new Set(LESSONS.map(l => l.id));
  const doneEntries = Object.entries(progress)
    .filter(([id, p]) => trackLessonIds.has(id) && p.completed)
    .map(([id, p]) => p);
  const done = doneEntries.length;
  document.getElementById('statDone').textContent = `${done}/${total}`;

  if (doneEntries.length){
    const avg = doneEntries.reduce((s,p) => s + (p.score/p.total*100), 0) / doneEntries.length;
    document.getElementById('statAvg').textContent = Math.round(avg) + '%';
  } else {
    document.getElementById('statAvg').textContent = '—';
  }

  // streak: consecutive days with at least one completion in EITHER track, counting back from today
  const allDoneEntries = Object.values(progress).filter(p => p.completed);
  const dates = new Set(allDoneEntries.map(p => p.lastDate));
  let streak = 0;
  let d = new Date();
  while (true){
    const key = d.toISOString().slice(0,10);
    if (dates.has(key)){ streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  document.getElementById('statStreak').textContent = streak;
}

function getCurrentLesson(){
  if (SUBJECT_ORDER.length === 0) return null;
  // find a subject with lessons remaining in the rotation, starting from subjectTurn
  for (let i = 0; i < SUBJECT_ORDER.length; i++){
    const idx = (cycle.subjectTurn + i) % SUBJECT_ORDER.length;
    const subj = SUBJECT_ORDER[idx];
    const list = SUBJECTS[subj];
    if (list && list.length > 0){
      cycle.subjectTurn = idx;
      const pointer = (cycle.pointers[subj] || 0) % list.length;
      return list[pointer];
    }
  }
  return null;
}

async function advanceCycle(){
  const subj = SUBJECT_ORDER[cycle.subjectTurn];
  const list = SUBJECTS[subj];
  const pointer = (cycle.pointers[subj] || 0) % list.length;
  cycle.pointers[subj] = pointer + 1; // moves forward; wraps via modulo next time this subject comes up
  cycle.subjectTurn = (cycle.subjectTurn + 1) % SUBJECT_ORDER.length;
  await saveCycle();
}

function renderCurrentLesson(){
  quizState = null;
  const lesson = getCurrentLesson();
  if (!lesson){
    const track = TRACKS.find(t => t.id === currentTrack);
    document.getElementById('mainPanel').innerHTML = `<div class="empty">No lessons yet on the ${track.label} side. Add some and re-run the upload script.</div>`;
    return;
  }
  currentLessonId = lesson.id;
  renderLessonView(lesson.id);
}

function subjectProgressLabel(lesson){
  const subj = subjectOf(lesson);
  const list = SUBJECTS[subj];
  const pointer = (cycle.pointers[subj] || 0) % list.length;
  return `${subj} — lesson ${pointer + 1} of ${list.length}`;
}

function renderLessonView(id){
  const lesson = LESSONS.find(l => l.id === id);
  const panel = document.getElementById('mainPanel');
  panel.innerHTML = `
    <div class="progress-row"><span>${subjectProgressLabel(lesson)}</span><span>${lesson.category}</span></div>
    <div class="subject-pill">${subjectOf(lesson)}</div>
    <div class="lesson-title">${lesson.title}</div>
    <div class="lesson-body">${lesson.body.map(p => `<p>${p}</p>`).join('')}</div>
    <button class="btn" id="startQuizBtn">Take the quiz →</button>
  `;
  document.getElementById('startQuizBtn').addEventListener('click', () => startQuiz(id));
}

function startQuiz(id){
  const lesson = LESSONS.find(l => l.id === id);
  quizState = { answers: new Array(lesson.quiz.length).fill(null), submitted: false };
  renderQuizView(id);
}

function renderQuizView(id){
  const lesson = LESSONS.find(l => l.id === id);
  const panel = document.getElementById('mainPanel');
  let html = `
    <div class="subject-pill">${subjectOf(lesson)}</div>
    <div class="lesson-title">${lesson.title} — Quiz</div>
  `;
  lesson.quiz.forEach((q, qi) => {
    html += `<div class="quiz-q"><div class="qtext">${qi+1}. ${q.q}</div>`;
    q.options.forEach((opt, oi) => {
      let cls = 'opt';
      if (quizState.submitted){
        cls += ' disabled';
        if (oi === q.correct) cls += ' correct';
        else if (quizState.answers[qi] === oi) cls += ' wrong';
      } else if (quizState.answers[qi] === oi){
        cls += ' selected';
      }
      html += `<div class="${cls}" data-qi="${qi}" data-oi="${oi}">${opt}</div>`;
    });
    html += `</div>`;
  });

  if (!quizState.submitted){
    html += `<button class="btn" id="submitQuizBtn">Submit answers</button> <button class="btn ghost" id="backToLessonBtn">← Back to passage</button>`;
  } else {
    const score = quizState.answers.filter((a, i) => a === lesson.quiz[i].correct).length;
    const total = lesson.quiz.length;
    const pct = Math.round(score/total*100);
    const pass = pct >= 70;
    html = `<div class="result-banner ${pass ? 'pass' : 'fail'}">${score}/${total} correct (${pct}%) — ${pass ? 'Passed.' : 'Below 70% — review and retry if you want, or move on.'}</div>` + html;
    html += `<button class="btn ghost" id="retryQuizBtn">Retry quiz</button> <button class="btn" id="nextBtn">Next lesson →</button>`;
  }

  panel.innerHTML = html;

  if (!quizState.submitted){
    panel.querySelectorAll('.opt').forEach(el => {
      el.addEventListener('click', () => {
        const qi = parseInt(el.dataset.qi);
        const oi = parseInt(el.dataset.oi);
        quizState.answers[qi] = oi;
        renderQuizView(id);
      });
    });
    const submitBtn = document.getElementById('submitQuizBtn');
    submitBtn.disabled = quizState.answers.includes(null);
    submitBtn.addEventListener('click', () => submitQuiz(id));
    document.getElementById('backToLessonBtn').addEventListener('click', () => {
      quizState = null;
      renderLessonView(id);
    });
  } else {
    document.getElementById('retryQuizBtn').addEventListener('click', () => startQuiz(id));
    document.getElementById('nextBtn').addEventListener('click', () => goToNext());
  }
}

async function submitQuiz(id){
  const lesson = LESSONS.find(l => l.id === id);
  quizState.submitted = true;
  const score = quizState.answers.filter((a, i) => a === lesson.quiz[i].correct).length;
  const total = lesson.quiz.length;
  const today = new Date().toISOString().slice(0,10);
  await saveProgress(id, { completed: score/total >= 0.7, score, total, lastDate: today });

  if (!cycle.completedOrder) cycle.completedOrder = [];
  cycle.completedOrder.push(id);
  await saveCycle();

  renderQuizView(id);
}

// ---------------- CHECKPOINT (every 5 completions) ----------------
let checkpointState = null; // { questions: [...], answers: [], submitted: bool }

function checkpointDue(){
  const count = (cycle.completedOrder || []).length;
  const seen = cycle.checkpointsSeen || 0;
  return Math.floor(count / 5) > seen;
}

function goToNext(){
  if (checkpointDue()){
    startCheckpoint();
  } else {
    advanceAndRenderNext();
  }
}

async function advanceAndRenderNext(){
  try {
    await advanceCycle();
  } catch (err) {
    console.error('advanceCycle failed, continuing anyway:', err);
  }
  renderCurrentLesson();
}

function startCheckpoint(){
  const last5Ids = cycle.completedOrder.slice(-5);
  const questions = last5Ids
    .map(id => LESSONS.find(l => l.id === id))
    .filter(l => l && l.checkpoint)
    .map(l => ({ ...l.checkpoint, sourceTitle: l.title }));
  checkpointState = { questions, answers: new Array(questions.length).fill(null), submitted: false };
  renderCheckpointView();
}

function renderCheckpointView(){
  const panel = document.getElementById('mainPanel');
  let html = `
    <div class="subject-pill" style="background:var(--green); color:var(--ink);">Checkpoint review</div>
    <div class="lesson-title">Mixed review — last 5 lessons</div>
    <div class="lesson-body"><p>Quick check across what you've just covered, mixed together. This isn't a repeat of the lesson quizzes — it applies the concepts.</p></div>
  `;
  checkpointState.questions.forEach((q, qi) => {
    html += `<div class="quiz-q"><div class="qtext">${qi+1}. (${q.sourceTitle}) ${q.q}</div>`;
    q.options.forEach((opt, oi) => {
      let cls = 'opt';
      if (checkpointState.submitted){
        cls += ' disabled';
        if (oi === q.correct) cls += ' correct';
        else if (checkpointState.answers[qi] === oi) cls += ' wrong';
      } else if (checkpointState.answers[qi] === oi){
        cls += ' selected';
      }
      html += `<div class="${cls}" data-qi="${qi}" data-oi="${oi}">${opt}</div>`;
    });
    html += `</div>`;
  });

  if (!checkpointState.submitted){
    html += `<button class="btn" id="submitCheckpointBtn">Submit review</button>`;
  } else {
    const score = checkpointState.answers.filter((a,i) => a === checkpointState.questions[i].correct).length;
    const total = checkpointState.questions.length;
    const pct = total ? Math.round(score/total*100) : 0;
    const pass = pct >= 70;
    html = `<div class="result-banner ${pass ? 'pass' : 'fail'}">${score}/${total} correct (${pct}%) on this checkpoint.</div>` + html;
    html += `<button class="btn" id="checkpointContinueBtn">Continue →</button>`;
  }

  panel.innerHTML = html;

  if (!checkpointState.submitted){
    panel.querySelectorAll('.opt').forEach(el => {
      el.addEventListener('click', () => {
        const qi = parseInt(el.dataset.qi);
        const oi = parseInt(el.dataset.oi);
        checkpointState.answers[qi] = oi;
        renderCheckpointView();
      });
    });
    const submitBtn = document.getElementById('submitCheckpointBtn');
    submitBtn.disabled = checkpointState.answers.includes(null);
    submitBtn.addEventListener('click', () => {
      checkpointState.submitted = true;
      renderCheckpointView();
    });
  } else {
    document.getElementById('checkpointContinueBtn').addEventListener('click', async () => {
      cycle.checkpointsSeen = Math.floor((cycle.completedOrder || []).length / 5);
      await saveCycle();
      checkpointState = null;
      await advanceAndRenderNext();
    });
  }
}

// initial paint happens once auth resolves and lessons are fetched
renderStats();
</script>
</body>
</html>
