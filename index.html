<style>
  :root{
    --ink:#161a1f;
    --paper:#f6f3ec;
    --panel:#1e242c;
    --panel-2:#252d37;
    --gold:#c9a24b;
    --gold-dim:#8a7238;
    --green:#5f9a72;
    --red:#c25c4f;
    --line:#333c47;
    --muted:#8b93a1;
    --white:#f2efe6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--ink);
    color:var(--white);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:980px; margin:0 auto; padding:32px 20px 80px;}

  header.top{
    display:flex; justify-content:space-between; align-items:flex-end;
    border-bottom:1px solid var(--line); padding-bottom:20px; margin-bottom:28px;
    flex-wrap:wrap; gap:12px;
  }
  .brand{
    font-family:'Fraunces',serif; font-weight:600; font-size:28px;
    letter-spacing:-0.01em;
  }
  .brand span{color:var(--gold);}
  .tagline{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-top:4px;}
  .stats{display:flex; gap:24px; font-family:'IBM Plex Mono',monospace;}
  .stat{text-align:right;}
  .stat .n{font-size:22px; color:var(--gold); font-weight:600;}
  .stat .l{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em;}

  .board{display:grid; grid-template-columns:280px 1fr; gap:24px;}
  @media (max-width:760px){ .board{grid-template-columns:1fr;} }

  .ledger-list{border-right:1px solid var(--line); padding-right:20px;}
  @media (max-width:760px){ .ledger-list{border-right:none; border-bottom:1px solid var(--line); padding-right:0; padding-bottom:20px;} }

  .cat-label{font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:var(--gold-dim); margin:18px 0 8px; }
  .cat-label:first-child{margin-top:0;}

  .entry{
    display:flex; align-items:center; gap:10px;
    padding:10px 8px; border-radius:4px; cursor:pointer;
    border-left:2px solid transparent;
    font-size:14px;
  }
  .entry:hover{background:var(--panel);}
  .entry.active{background:var(--panel-2); border-left:2px solid var(--gold);}
  .entry .dot{
    width:8px; height:8px; border-radius:50%; flex-shrink:0;
    border:1.5px solid var(--muted);
  }
  .entry.done .dot{background:var(--green); border-color:var(--green);}
  .entry .title{flex:1; color:var(--white);}
  .entry .score{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gold);}

  .panel{background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:32px;}
  .lesson-cat{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gold); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px;}
  .lesson-title{font-family:'Fraunces',serif; font-size:32px; font-weight:600; margin-bottom:20px; line-height:1.25;}
  .lesson-body p{font-size:18px; line-height:1.8; color:#d7d9dd; margin-bottom:18px;}
  .lesson-body strong{color:var(--gold);}

  .btn{
    font-family:'IBM Plex Mono',monospace; font-size:13px; text-transform:uppercase; letter-spacing:0.06em;
    background:var(--gold); color:var(--ink); border:none; padding:14px 22px; border-radius:4px;
    cursor:pointer; font-weight:600; margin-top:10px;
  }
  .btn:hover{background:#dab767;}
  .btn.ghost{background:transparent; border:1px solid var(--line); color:var(--white);}
  .btn.ghost:hover{border-color:var(--gold); color:var(--gold);}
  .btn:disabled{opacity:0.4; cursor:not-allowed;}

  .quiz-q{margin-bottom:26px;}
  .quiz-q .qtext{font-size:18px; margin-bottom:12px; color:var(--white); font-weight:500; line-height:1.5;}
  .opt{
    display:block; padding:13px 16px; margin-bottom:9px; border:1px solid var(--line);
    border-radius:4px; cursor:pointer; font-size:16px; color:#d7d9dd; line-height:1.5;
  }
  .opt:hover{border-color:var(--gold-dim);}
  .opt.selected{border-color:var(--gold); background:rgba(201,162,75,0.08);}
  .opt.correct{border-color:var(--green); background:rgba(95,154,114,0.12); color:var(--green);}
  .opt.wrong{border-color:var(--red); background:rgba(194,92,79,0.12); color:var(--red);}
  .opt.disabled{cursor:default;}

  .result-banner{
    font-family:'IBM Plex Mono',monospace; padding:16px; border-radius:4px; margin-bottom:20px;
    font-size:14px;
  }
  .result-banner.pass{background:rgba(95,154,114,0.12); border:1px solid var(--green); color:var(--green);}
  .result-banner.fail{background:rgba(194,92,79,0.12); border:1px solid var(--red); color:var(--red);}

  .empty{color:var(--muted); font-size:14px; text-align:center; padding:60px 20px;}
  .loading{color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:12px;}
  .footnote{margin-top:24px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted);}
</style>

// Fixed backing account — the login screen only asks for the password.

const FIXED_EMAIL = "rayden@ledger.local";

let db, auth, uid = null;
let firebaseReady = false;
let firebaseConfigured = true;

function showLogin(){
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('appBoard').style.display = 'none';
}
function showApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appBoard').style.display = 'grid';
}

try {
  const app = initializeApp(firebaseConfig);
  auth = getAuth(app);
  db = getFirestore(app);
  onAuthStateChanged(auth, (user) => {
    if (user) {
      uid = user.uid;
      firebaseReady = true;
      document.getElementById('authNote').textContent = `Signed in as ${user.email}. Progress synced.`;

      firebaseReady = false;
      document.getElementById('authNote').textContent = 'Sign in to continue.';
      showLogin();

} catch (e) {
  firebaseConfigured = false;
  document.getElementById('authNote').textContent = 'Offline mode — progress saved on this device only (Firebase not configured yet).';

  loadProgressAndRender();
}

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginPassword').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

function doLogin(){
  const pw = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if (!pw){
    errEl.textContent = 'Enter your password.';
    errEl.style.display = 'block';
    return;
  }
  signInWithEmailAndPassword(auth, FIXED_EMAIL, pw).catch(err => {
    errEl.textContent = 'Wrong password.';
    errEl.style.display = 'block';
  });
}

const LESSONS = [
  {
    id: "cma-variance-1",
    category: "CMA · Cost Management",
    title: "Standard Costing & Variance Analysis",
    body: [
      "Standard costing sets a predetermined cost per unit for materials, labor, and overhead, based on expected efficiency and prices. Actual results are then compared against this standard to isolate exactly where performance diverged from plan.",
      "A <strong>price variance</strong> measures the difference caused by paying more or less than the standard rate — for example, a supplier price increase drives an unfavorable materials price variance. A <strong>quantity (efficiency) variance</strong> measures the difference caused by using more or less input than standard — like excess scrap on the shop floor.",
      "The core formula: Price Variance = (Actual Price − Standard Price) × Actual Quantity. Quantity Variance = (Actual Quantity − Standard Quantity) × Standard Price. Keeping price and quantity effects separate is the entire point — it tells management whether to talk to purchasing or to the production floor."
    ],
    quiz: [

        q: "A materials price variance is unfavorable. What does that most directly indicate?",

        correct: 1
      },

        q: "Why separate price and quantity variances instead of reporting one total variance?",

      "<strong>Mixed costs</strong> contain both a fixed and variable component — a utility bill with a flat base fee plus usage charges is the classic example. To plan and budget accurately, mixed costs need to be split into their fixed and variable pieces, commonly using the high-low method or regression analysis.",
      "This distinction drives contribution margin analysis: Sales − Variable Costs = Contribution Margin, which then covers fixed costs before anything becomes profit. Misclassifying a cost as fixed when it's actually variable will throw off every break-even and pricing decision built on top of it."

// ---------------- STATE ----------------
let progress = {}; // { lessonId: { completed: bool, score: number, total: number, lastDate: 'YYYY-MM-DD' } }
let activeLessonId = null;
let quizState = null; // { answers: [], submitted: bool }

const LOCAL_KEY = 'ledger_progress_v1';

async function loadProgressAndRender(){
  if (firebaseReady && uid){
    const snap = await getDocs(collection(db, 'users', uid, 'progress'));
    progress = {};
    snap.forEach(d => progress[d.id] = d.data());
  } else {
    try{ progress = JSON.parse(localStorage.getItem(LOCAL_KEY) || '{}'); } catch(e){ progress = {}; }
  }
  renderLedger();
  renderStats();
  if (!activeLessonId) renderEmpty();
}

async function saveProgress(lessonId, data){
  progress[lessonId] = data;
  if (firebaseReady && uid){
    await setDoc(doc(db, 'users', uid, 'progress', lessonId), data);
  } else {
    localStorage.setItem(LOCAL_KEY, JSON.stringify(progress));
  }
  renderLedger();
  renderStats();
}

function renderStats(){
  const total = LESSONS.length;
  const doneEntries = Object.values(progress).filter(p => p.completed);
  const done = doneEntries.length;
  document.getElementById('statDone').textContent = `${done}/${total}`;

  if (doneEntries.length){
    const avg = doneEntries.reduce((s,p) => s + (p.score/p.total*100), 0) / doneEntries.length;
    document.getElementById('statAvg').textContent = Math.round(avg) + '%';
  } else {
    document.getElementById('statAvg').textContent = '—';
  }

  // streak: consecutive days with at least one completion, counting back from today
  const dates = new Set(doneEntries.map(p => p.lastDate));
  let streak = 0;
  let d = new Date();
  while (true){
    const key = d.toISOString().slice(0,10);
    if (dates.has(key)){ streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  document.getElementById('statStreak').textContent = streak;
}

function renderLedger(){
  const list = document.getElementById('ledgerList');
  list.innerHTML = '';
  let lastCat = null;
  LESSONS.forEach(lesson => {
    if (lesson.category !== lastCat){
      const catEl = document.createElement('div');
      catEl.className = 'cat-label';
      catEl.textContent = lesson.category;
      list.appendChild(catEl);
      lastCat = lesson.category;
    }
    const p = progress[lesson.id];
    const entry = document.createElement('div');
    entry.className = 'entry' + (lesson.id === activeLessonId ? ' active' : '') + (p && p.completed ? ' done' : '');
    entry.innerHTML = `
      <span class="dot"></span>
      <span class="title">${lesson.title}</span>
      ${p && p.completed ? `<span class="score">${p.score}/${p.total}</span>` : ''}
    `;
    entry.addEventListener('click', () => openLesson(lesson.id));
    list.appendChild(entry);
  });
}

function renderEmpty(){
  document.getElementById('mainPanel').innerHTML = `<div class="empty">Select a lesson from the ledger to begin.</div>`;
}

function openLesson(id){
  activeLessonId = id;
  quizState = null;
  renderLedger();
  renderLessonView(id);
}

function renderLessonView(id){
  const lesson = LESSONS.find(l => l.id === id);
  const panel = document.getElementById('mainPanel');
  panel.innerHTML = `
    <div class="lesson-cat">${lesson.category}</div>
    <div class="lesson-title">${lesson.title}</div>
    <div class="lesson-body">${lesson.body.map(p => `<p>${p}</p>`).join('')}</div>
    <button class="btn" id="startQuizBtn">Take the quiz →</button>
  `;
  document.getElementById('startQuizBtn').addEventListener('click', () => startQuiz(id));
}

function startQuiz(id){
  const lesson = LESSONS.find(l => l.id === id);
  quizState = { answers: new Array(lesson.quiz.length).fill(null), submitted: false };
  renderQuizView(id);
}

function renderQuizView(id){
  const lesson = LESSONS.find(l => l.id === id);
  const panel = document.getElementById('mainPanel');
  let html = `
    <div class="lesson-cat">${lesson.category}</div>
    <div class="lesson-title">${lesson.title} — Quiz</div>
  `;
  lesson.quiz.forEach((q, qi) => {
    html += `<div class="quiz-q"><div class="qtext">${qi+1}. ${q.q}</div>`;
    q.options.forEach((opt, oi) => {
      let cls = 'opt';
      if (quizState.submitted){
        cls += ' disabled';
        if (oi === q.correct) cls += ' correct';
        else if (quizState.answers[qi] === oi) cls += ' wrong';
      } else if (quizState.answers[qi] === oi){
        cls += ' selected';
      }
      html += `<div class="${cls}" data-qi="${qi}" data-oi="${oi}">${opt}</div>`;
    });
    html += `</div>`;
  });

  if (!quizState.submitted){
    html += `<button class="btn" id="submitQuizBtn">Submit answers</button>`;
  } else {
    const score = quizState.answers.filter((a, i) => a === lesson.quiz[i].correct).length;
    const total = lesson.quiz.length;
    const pct = Math.round(score/total*100);
    const pass = pct >= 70;
    html = `<div class="result-banner ${pass ? 'pass' : 'fail'}">${score}/${total} correct (${pct}%) — ${pass ? 'Passed.' : 'Below 70% — review the lesson and retry.'}</div>` + html;
    html += `<button class="btn ghost" id="retryQuizBtn">Retry quiz</button> <button class="btn ghost" id="backBtn">Back to lesson</button>`;
  }

  panel.innerHTML = html;

  if (!quizState.submitted){
    panel.querySelectorAll('.opt').forEach(el => {
      el.addEventListener('click', () => {
        const qi = parseInt(el.dataset.qi);
        const oi = parseInt(el.dataset.oi);
        quizState.answers[qi] = oi;
        renderQuizView(id);
      });
    });
    const submitBtn = document.getElementById('submitQuizBtn');
    submitBtn.disabled = quizState.answers.includes(null);
    submitBtn.addEventListener('click', () => submitQuiz(id));
  } else {
    document.getElementById('retryQuizBtn').addEventListener('click', () => startQuiz(id));
    document.getElementById('backBtn').addEventListener('click', () => renderLessonView(id));
  }
}

async function submitQuiz(id){
  const lesson = LESSONS.find(l => l.id === id);
  quizState.submitted = true;
  const score = quizState.answers.filter((a, i) => a === lesson.quiz[i].correct).length;
  const total = lesson.quiz.length;
  const today = new Date().toISOString().slice(0,10);
  await saveProgress(id, { completed: score/total >= 0.7, score, total, lastDate: today });
  renderQuizView(id);
}

// initial paint before auth resolves
renderLedger();
renderStats();
